<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akhil &amp; Shannon — Find Your Seat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --sky:#7a93ab;
    --sky-deep:#5b7185;
    --mist:#eef2f6;
    --paper:#fbfcfd;
    --ink:#2c3742;
    --ink-soft:#6a7884;
    --line:#dfe7ee;
    --ridge:#c4d2de;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:'Inter',sans-serif;
    color:var(--ink);
    background:var(--mist);
    line-height:1.5;
    padding-bottom:64px;
  }

  header{
    position:relative;
    text-align:center;
    padding:54px 24px 38px;
    background:
      linear-gradient(180deg,rgba(122,147,171,0) 40%,var(--mist) 100%),
      linear-gradient(160deg,#8ba4ba 0%,#6c869c 100%);
    color:#fff;
    overflow:hidden;
  }
  .ridges{position:absolute;left:0;right:0;bottom:0;height:90px;pointer-events:none}
  .ridges svg{display:block;width:100%;height:100%}
  .eyebrow{
    font-family:'Inter';
    text-transform:uppercase;
    letter-spacing:.32em;
    font-size:11px;
    font-weight:600;
    opacity:.85;
    margin-bottom:14px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-weight:300;
    font-size:clamp(34px,11vw,52px);
    line-height:1.04;
    letter-spacing:-.01em;
  }
  h1 .amp{font-style:italic;font-weight:400;display:block;font-size:.62em;margin:4px 0;opacity:.92}
  .subhead{
    margin-top:16px;
    font-size:13.5px;
    letter-spacing:.04em;
    opacity:.9;
  }

  .search-wrap{
    max-width:560px;
    margin:-18px auto 0;
    padding:0 20px;
    position:relative;
    z-index:3;
  }
  .search{
    width:100%;
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:14px;
    padding:15px 18px 15px 46px;
    font-size:16px;
    font-family:'Inter';
    color:var(--ink);
    box-shadow:0 8px 24px rgba(60,90,120,.10);
    outline:none;
  }
  .search:focus{border-color:var(--sky);box-shadow:0 8px 24px rgba(60,90,120,.18)}
  .search::placeholder{color:var(--ink-soft)}
  .search-icon{
    position:absolute;left:36px;top:50%;transform:translateY(-50%);
    width:18px;height:18px;color:var(--ink-soft);pointer-events:none;
  }
  .count{
    text-align:center;font-size:12px;color:var(--ink-soft);
    margin:12px 0 4px;letter-spacing:.02em;min-height:16px;
  }

  main{max-width:560px;margin:8px auto 0;padding:0 20px}
  .table-card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:16px;
    padding:20px 22px 22px;
    margin-bottom:14px;
    transition:opacity .15s;
  }
  .table-card.has-hit{
    border-color:var(--sky);
    box-shadow:0 8px 28px rgba(91,113,133,.18);
  }
  .table-head{
    display:flex;align-items:baseline;gap:10px;
    padding-bottom:14px;margin-bottom:14px;
    border-bottom:1px solid var(--line);
  }
  .peak-icon{flex:0 0 auto;width:22px;height:22px;color:var(--sky);transform:translateY(3px)}
  .table-name{
    font-family:'Fraunces',serif;
    font-weight:400;
    font-size:21px;
    color:var(--ink);
    letter-spacing:-.005em;
    flex:1;
  }
  .seat-count{
    font-size:11px;color:var(--ink-soft);text-transform:uppercase;
    letter-spacing:.12em;font-weight:600;white-space:nowrap;
  }
  .guests{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:9px 18px;
  }
  .guest{
    font-size:15px;color:var(--ink);
    padding-left:14px;position:relative;
  }
  .guest::before{
    content:"";position:absolute;left:0;top:9px;
    width:5px;height:5px;border-radius:50%;
    background:var(--ridge);
  }
  .guest.hit{
    color:#fff;font-weight:600;
    background:var(--sky);
    border-radius:8px;
    padding:6px 12px 6px 24px;
    margin:-3px 0;
    box-shadow:0 4px 12px rgba(91,113,133,.30);
  }
  .guest.hit::before{
    background:#fff;
    left:11px;top:50%;transform:translateY(-50%);
    width:6px;height:6px;
  }

  .no-results{
    text-align:center;color:var(--ink-soft);
    padding:40px 20px;font-size:15px;display:none;
  }
  .no-results.show{display:block}

  footer{
    text-align:center;color:var(--ink-soft);
    font-size:12px;letter-spacing:.06em;
    margin-top:30px;padding:0 20px;
  }
  footer .heart{color:var(--sky)}

  @media (max-width:380px){
    .guests{grid-template-columns:1fr}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important}
  }
</style>
</head>
<body>
  <header>
    <div class="eyebrow">Find Your Seat</div>
    <h1>Akhil<span class="amp">&amp;</span>Shannon</h1>
    <div class="subhead">July 3, 2026 &middot; Gray Bridge, Sultan WA</div>
    <div class="ridges" aria-hidden="true">
      <svg viewBox="0 0 560 90" preserveAspectRatio="none">
        <path d="M0,90 L0,52 L70,20 L130,46 L200,8 L280,42 L350,16 L430,48 L500,22 L560,46 L560,90 Z" fill="rgba(255,255,255,.10)"/>
        <path d="M0,90 L0,64 L90,36 L160,60 L240,28 L320,56 L400,32 L470,58 L560,38 L560,90 Z" fill="rgba(238,242,246,.55)"/>
        <path d="M0,90 L0,74 L110,56 L200,72 L300,52 L390,70 L490,54 L560,68 L560,90 Z" fill="var(--mist)"/>
      </svg>
    </div>
  </header>

  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search" id="search" type="text" placeholder="Type your name&hellip;" autocomplete="off" aria-label="Search for your name">
  </div>
  <div class="count" id="count"></div>

  <main id="tables"></main>
  <div class="no-results" id="noResults">No name found. Try just your first name, or check with the couple.</div>

  <footer>With love &middot; <span class="heart">&#9670;</span> &middot; Akhil &amp; Shannon</footer>

<script>
  const SEATING = [
    { name: "Mount Rainier", guests: ["Nate","Niko","Earnest","Anna","Chris C","Zach","Vanessa","Laurie","Jordan"] },
    { name: "Smoky Mountains", guests: ["Linda","Jimmy","Shiya","Rupert","Brandon","Kiki"] },
    { name: "Haleakala", guests: ["Yvonne","Travis","Sarah","Michelle","Asif"] },
    { name: "Mount Baker", guests: ["Trevor","Gabi","Drew","Hwa-in","Max","Yuki","Andrew G"] },
    { name: "Enchantments", guests: ["Danny","Gloria","Patrick","Tori","Amy","Luna","Matt","Daniel","Xime","Blaise","Chris S","Raven","Joel","Javiera","Zexin"] },
    { name: "Diamond Head", guests: ["Adam","Susan","Kassandra","Mahesh","Binu","Harita","Chris A"] },
    { name: "Glacier", guests: ["Diana","Alcides","Mathew","Andrew S","Rachel"] },
    { name: "Olympic", guests: ["Arjun","Guna","Shubranshu","Ponmalar","Bala","Sadhave","Raj","Priyanka","Kaushik","Manoja"] }
  ];

  const PEAK = '<svg class="peak-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M3 20 L9 7 L13 14 L16 9 L21 20 Z"/><path d="M7.5 11.5 L9 9 L10.5 11.5"/></svg>';

  const tablesEl = document.getElementById('tables');
  const searchEl = document.getElementById('search');
  const countEl = document.getElementById('count');
  const noResults = document.getElementById('noResults');

  function render(filter){
    const q = (filter||'').trim().toLowerCase();
    tablesEl.innerHTML = '';
    let anyVisible = false;
    let matchTotal = 0;

    SEATING.forEach(t => {
      const matches = q ? t.guests.filter(g => g.toLowerCase().includes(q)) : [];
      const show = !q || matches.length > 0;
      if(!show) return;
      anyVisible = true;
      matchTotal += matches.length;

      const card = document.createElement('section');
      card.className = 'table-card' + (matches.length ? ' has-hit' : '');

      const guestHTML = t.guests.map(g => {
        const hit = q && g.toLowerCase().includes(q);
        return '<div class="guest'+(hit?' hit':'')+'">'+g+'</div>';
      }).join('');

      card.innerHTML =
        '<div class="table-head">'+PEAK+
          '<span class="table-name">'+t.name+'</span>'+
          '<span class="seat-count">'+t.guests.length+' seats</span>'+
        '</div>'+
        '<div class="guests">'+guestHTML+'</div>';
      tablesEl.appendChild(card);
    });

    noResults.classList.toggle('show', q && !anyVisible);
    if(q){
      countEl.textContent = anyVisible
        ? matchTotal+' match'+(matchTotal===1?'':'es')+' found'
        : '';
    } else {
      countEl.textContent = SEATING.length+' tables';
    }
  }

  let raf;
  searchEl.addEventListener('input', e => {
    cancelAnimationFrame(raf);
    raf = requestAnimationFrame(() => render(e.target.value));
  });

  render('');
</script>
</body>
</html>
